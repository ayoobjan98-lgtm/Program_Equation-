<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حل معادله جدید</title>
  <link href="https://cdn.fontcdn.ir/font/vazir/Vazir.css" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Vazir, sans-serif;
      background: #f0f2f5;
      padding-bottom: 70px;
    }
    .app-header {
      background: linear-gradient(135deg, #0984e3, #6c5ce7);
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 15px rgba(9, 132, 227, 0.3);
    }
    .app-header h1 { font-size: 26px; letter-spacing: 1px; }
    .app-header p { font-size: 14px; opacity: 0.9; margin-top: 4px; }
    .main-content {
      padding: 15px;
      max-width: 640px;
      margin: 0 auto;
    }
    .solver-card {
      background: white;
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }
    .selector-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .selector-row label {
      font-weight: bold;
      font-size: 16px;
      color: #2d3436;
    }
    .select-box {
      padding: 8px 14px;
      border-radius: 12px;
      border: 1px solid #dfe6e9;
      font-family: Vazir;
      font-size: 14px;
      background: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .select-box:focus {
      border-color: #0984e3;
      outline: none;
      box-shadow: 0 0 0 3px rgba(9, 132, 227, 0.15);
    }
    .solver-container {
      margin: 16px 0;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 16px;
      border: 1px solid #e9ecef;
    }
    .equation-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
      padding: 8px 12px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      direction: ltr;
    }
    .equation-row input[type="number"] {
      width: 58px;
      padding: 6px 4px;
      border: 1px solid #ced4da;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      font-family: Vazir;
      transition: 0.2s;
    }
    .equation-row input[type="number"]:focus {
      border-color: #0984e3;
      outline: none;
      box-shadow: 0 0 0 3px rgba(9, 132, 227, 0.12);
    }
    .var-label {
      font-weight: bold;
      color: #2d3436;
      font-size: 15px;
      min-width: 18px;
    }
    .op,
    .eq-sign {
      font-weight: bold;
      color: #636e72;
      font-size: 16px;
      padding: 0 2px;
    }
    .btn {
      display: inline-block;
      padding: 14px 24px;
      background: linear-gradient(135deg, #0984e3, #6c5ce7);
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 17px;
      font-family: Vazir;
      cursor: pointer;
      width: 100%;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(9, 132, 227, 0.25);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(9, 132, 227, 0.35);
    }
    .btn:active {
      transform: translateY(0);
    }
    .result-box,
    .steps-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      border-right: 5px solid;
      background: #f8f9fa;
      line-height: 1.9;
      font-size: 15px;
    }
    .steps-box {
      background: #f1f2f6;
      max-height: 320px;
      overflow-y: auto;
      font-size: 13px;
      white-space: pre-wrap;
      border-right-color: #0984e3;
    }
    .steps-box div {
      background: white;
      padding: 12px;
      border-radius: 12px;
      border-right: 4px solid #0984e3;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
    }
    .plot-container {
      margin-top: 20px;
      border-radius: 18px;
      overflow: hidden;
      background: white;
      border: 1px solid #ddd;
      height: 460px;
      position: relative;
    }
    .plot-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    .coords-hud {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 10px 18px;
      border-radius: 30px;
      font-family: Vazir, sans-serif;
      font-size: 14px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: none;
      z-index: 10;
      direction: ltr;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .coords-hud span {
      color: #ff6b6b;
      font-weight: bold;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 8px 0 10px;
      border-top: 1px solid #e9ecef;
      box-shadow: 0 -2px 15px rgba(0, 0, 0, 0.04);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: #636e72;
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 30px;
      transition: 0.2s;
    }
    .nav-item.active {
      color: #0984e3;
      background: rgba(9, 132, 227, 0.06);
    }
    .nav-icon {
      font-size: 22px;
      margin-bottom: 2px;
    }
    .nav-label {
      font-weight: 500;
    }
    @media (max-width: 480px) {
      .equation-row input[type="number"] {
        width: 46px;
        font-size: 12px;
      }
      .solver-card {
        padding: 16px;
      }
      .plot-container {
        height: 340px;
      }
    }
  </style>
</head>
<body>

  <header class="app-header">
    <h1>➕ معادله جدید</h1>
    <p>تعداد مجهولات را انتخاب کن</p>
  </header>

  <main class="main-content">
    <div class="solver-card">
      <div class="selector-row">
        <label for="change">تعداد مجهولات:</label>
        <select id="change" class="select-box">
          <option value="1">۱ مجهول</option>
          <option value="2" selected>۲ مجهول</option>
          <option value="3">۳ مجهول</option>
          <option value="4">۴ مجهول</option>
        </select>
      </div>

      <div id="solverContainer" class="solver-container"></div>

      <button id="solveBtn" class="btn">🚀 حل معادله</button>

      <div id="resultBox" class="result-box" style="display:none;"></div>
      <div id="stepsBox" class="steps-box" style="display:none;"></div>

      <div id="plotContainer" class="plot-container" style="display:none;">
        <div id="coordsHud" class="coords-hud" style="display:none;">
          🎯 مختصات: <span id="coordDisplay">(0, 0, 0)</span>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">خانه</span>
    </a>
    <a href="add.html" class="nav-item active">
      <span class="nav-icon">➕</span>
      <span class="nav-label">جدید</span>
    </a>
    <a href="favert.html" class="nav-item">
      <span class="nav-icon">❤️</span>
      <span class="nav-label">علاقه‌مندی</span>
    </a>
    <a href="gaid.html" class="nav-item">
      <span class="nav-icon">📖</span>
      <span class="nav-label">راهنما</span>
    </a>
  </nav>

  <!-- Plotly برای ۱ و ۲ بعد -->
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>

  <!-- Three.js برای ۳ بعد -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="js.js"></script>
</body>
  </html>
